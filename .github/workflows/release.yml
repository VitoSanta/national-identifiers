name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  nuget:
    name: Publish NuGet packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test packages/dotnet/NationalIdentifiers.Tests/NationalIdentifiers.Tests.csproj --configuration Release
      - run: dotnet pack packages/dotnet/NationalIdentifiers.Core/NationalIdentifiers.Core.csproj --configuration Release --output artifacts
      - run: dotnet pack packages/dotnet/NationalIdentifiers.AspNetCore/NationalIdentifiers.AspNetCore.csproj --configuration Release --output artifacts
      - name: NuGet login (OIDC trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: vitosanta
      - name: Push packages
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
